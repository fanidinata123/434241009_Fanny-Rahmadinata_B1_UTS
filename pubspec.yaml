name: helpdesk_app
description: E-Ticketing Helpdesk Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # HTTP & Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Image & File
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true